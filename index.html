═══════════════════════════════════════════════════ */
/* ─── Auto Feeding Task Generator ───────────────────────────────────────────
   Generates two AI feeding reminder tasks per worker per day:
     • Morning feeding — 07:00
     • Evening feeding — 18:00
   Keyed as: autoFeed_{workerId}_{date}_{slot}  (slot = "AM" | "PM")
   Auto-marks done when worker logs a feed entry on that date.
──────────────────────────────────────────────────────────────────────────── */
function useAutoFeedingTasks(tasks,setTasks,users,feeds){
  useEffect(()=>{
    const workers=users.filter(u=>u.role==="worker"&&u.approved);
    if(workers.length===0) return;
    const today=toDay();
    let changed=false;
    const updated=[...tasks];

    workers.forEach(w=>{
      ["AM","PM"].forEach(slot=>{
        const taskId=`autoFeed_${w.id}_${today}_${slot}`;
        const exists=updated.find(t=>t.id===taskId);
        const title=slot==="AM"?"🌅 Morning Feeding (07:00)":"🌆 Evening Feeding (18:00)";
        const desc=slot==="AM"?"Feed all pigs by 7:00 AM and log the feeding entry.":"Feed all pigs by 6:00 PM and log the feeding entry.";

        // Check if worker logged a feed today
        const fedToday=feeds.some(f=>f.workerId===w.id&&f.date===today);

        if(!exists){
          // Create new auto task
          updated.push({
            id:taskId,
            title,
            desc,
            workerId:w.id,
            priority:"High",
            due:today,
            createdBy:"🤖 AI Auto-Task",
            createdAt:today,
            status:fedToday?"done":"pending",
            autoFeed:true,
            slot
          });
          changed=true;
        } else if(exists.status==="pending"&&fedToday){
          // Auto-mark done when feed was logged
          const idx=updated.findIndex(t=>t.id===taskId);
          if(idx>=0){updated[idx]={...updated[idx],status:"done",autoCompletedAt:new Date().toISOString()};changed=true;}
        }
      });
    });

    if(changed){
      setTasks(updated);
      fsSet("tasks",updated);
    }
  },[users,feeds,tasks.length]);
}

                  <span style={{margin:"0 5px",color:C.border}}>·</span>

        {[["💰 Initial Capital",fmtRWF(capital.initial||0),"rgba(74,222,128,.6)"],["📥 Total Income",fmtRWF(incomeTotal),"#34d399"],["📤 Total Expenses",fmtRWF(expenseTotal),"#f87171"]].map(([l,v,c])=>(

    {/* Add Transaction */}
    {tab==="add"&&(<div style={{maxWidth:500}}>
      {saved&&<div style={{padding:10,background:C.accentSoft,borderRadius:8,marginBottom:12,color:C.accent,fontSize:13,fontWeight:600}}>✅ Transaction recorded!</div>}

          {[["income","📥 Income"],["expense","📤 Expense"]].map(([v,l])=>(
            <button key={v} onClick={()=>setForm({...form,type:v,category:v==="income"?"Other Income":"Other"})} style={{flex:1,padding:"10px",borderRadius:10,border:"2px solid "+(form.type===v?v==="income"?C.accent:C.red:C.border),background:form.type===v?v==="income"?C.accentSoft:"rgba(239,68,68,.07)":"transparent",color:form.type===v?v==="income"?C.accent:C.red:C.muted,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>

            <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} style={S.inp}>

          <div style={{gridColumn:"1/-1"}}>
            <label style={S.lbl}>Description</label>
            <input placeholder="e.g. Bought 50kg maize bran from market" value={form.description} onChange={e=>setForm({...form,description:e.target.value})} style={S.inp}/>

        </div>}
        <button onClick={addTx} disabled={!form.amount||parseFloat(form.amount)<=0} style={{...S.btn(form.type==="income"?C.accent:C.red),width:"100%",padding:12,fontSize:14,opacity:!form.amount?0.5:1}}>
          {form.type==="income"?"📥 Record Income →":"📤 Record Expense →"}
        </button>
      </div>

    {/* History */}
    {tab==="history"&&(<div>
      <div style={{background:"linear-gradient(135deg,#0f2318,#1a3d26)",borderRadius:12,padding:"14px 18px",marginBottom:12}}>
        <div style={{fontSize:10,color:"rgba(74,222,128,.6)",fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Current Balance</div>
        <div style={{fontSize:24,fontWeight:800,color:balance>=0?"#4ade80":"#f87171"}}>{fmtRWF(balance)}</div>
        <div style={{display:"flex",gap:14,marginTop:5,flexWrap:"wrap"}}>
          <span style={{fontSize:11,color:"rgba(74,222,128,.6)"}}>↑ In: <b style={{color:"#4ade80"}}>{fmtRWF(incomeTotal)}</b></span>
          <span style={{fontSize:11,color:"rgba(248,113,113,.6)"}}>↓ Out: <b style={{color:"#f87171"}}>{fmtRWF(expenseTotal)}</b></span>
          <span style={{fontSize:11,color:"rgba(255,255,255,.35)"}}>📋 {txs.length} tx</span>
        </div>
      </div>
      <div style={S.card}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>📋 All Transactions ({txs.length})</div>
        {txs.length===0&&<div style={{color:C.faint,fontSize:13}}>No transactions recorded yet.</div>}
        {txs.slice().reverse().map((tx,i)=>(
        <div key={i} style={{...S.card,marginBottom:8,padding:"10px 13px",border:"1px solid "+(tx.type==="income"?"rgba(16,185,129,.15)":"rgba(239,68,68,.15)")}}>
          {editId===tx.id?(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <div><label style={S.lbl}>Type</label>
                  <select value={editForm.type} onChange={e=>setEditForm({...editForm,type:e.target.value})} style={S.inp}><option value="income">Income</option><option value="expense">Expense</option></select>
                </div>
                <div><label style={S.lbl}>Amount</label><input type="number" value={editForm.amount} onChange={e=>setEditForm({...editForm,amount:e.target.value})} style={S.inp}/></div>
                <div><label style={S.lbl}>Category</label><input value={editForm.category} onChange={e=>setEditForm({...editForm,category:e.target.value})} style={S.inp}/></div>
                <div><label style={S.lbl}>Date</label><input type="date" value={editForm.date} onChange={e=>setEditForm({...editForm,date:e.target.value})} style={S.inp}/></div>
                <div style={{gridColumn:"1/-1"}}><label style={S.lbl}>Description</label><input value={editForm.description} onChange={e=>setEditForm({...editForm,description:e.target.value})} style={S.inp}/></div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>saveEdit(tx.id)} style={{...S.btn(C.accent),flex:1,padding:"8px",fontSize:12}}>✓ Save</button>
                <button onClick={()=>{setEditId(null);setEditForm(null);}} style={{...S.btn("#374151"),flex:1,padding:"8px",fontSize:12}}>Cancel</button>
              </div>
            </div>
          ):(
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:2}}>
                  <span style={{fontSize:11,padding:"2px 7px",borderRadius:12,background:tx.type==="income"?"rgba(16,185,129,.12)":"rgba(239,68,68,.12)",color:tx.type==="income"?"#10b981":C.red,fontWeight:700}}>{tx.type==="income"?"↑ IN":"↓ OUT"}</span>
                  <span style={{color:C.text,fontWeight:600,fontSize:12}}>{tx.category}</span>
                  {tx.manual&&<span style={{fontSize:9,color:C.faint,background:C.elevated,padding:"1px 5px",borderRadius:5}}>manual</span>}
                </div>
                {tx.description&&<div style={{fontSize:11,color:C.faint,paddingLeft:38}}>{tx.description}</div>}
                <div style={{fontSize:10,color:C.faint,paddingLeft:38,marginTop:2}}>{tx.date}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontWeight:700,color:tx.type==="income"?"#10b981":C.red,fontSize:14}}>{tx.type==="income"?"+":"-"}{fmtRWF(tx.amount)}</div>
                <div style={{display:"flex",gap:5,marginTop:5,justifyContent:"flex-end"}}>
                  <button onClick={()=>{setEditId(tx.id);setEditForm({type:tx.type,category:tx.category,amount:String(tx.amount),description:tx.description||"",date:tx.date});}} style={{fontSize:10,padding:"3px 9px",borderRadius:6,border:"1px solid "+C.border,background:"transparent",color:C.muted,cursor:"pointer",fontFamily:"inherit"}}>✏️ Edit</button>
                  <button onClick={()=>{if(window.confirm("Delete this transaction?"))deleteTx(tx.id);}} style={{fontSize:10,padding:"3px 9px",borderRadius:6,border:"1px solid rgba(239,68,68,.3)",background:"transparent",color:C.red,cursor:"pointer",fontFamily:"inherit"}}>🗑️</button>
                </div>
              </div>
            </div>
          )}
        </div>
        ))}
      </div>
    </div>)}
  </div>);
}

/* ─── Login ─── */
function Login({setUser, pendingApproval, setPendingApproval}){
  const [tab,setTab]=useState("login");
  const [form,setForm]=useState({name:"",email:"",password:"",confirmPassword:""});
  const [err,setErr]=useState(pendingApproval?"Your account is pending admin approval. Please wait.":"");
  const [ok,setOk]=useState("");
  const [loading,setLoading]=useState(false);
  const [gLoading,setGLoading]=useState(false);

  /* ── helpers ── */
  const inp2={background:"#f8fafc",border:"1.5px solid #e2e8f0",color:"#1e293b",borderRadius:10,padding:"11px 14px",width:"100%",fontSize:13.5,outline:"none",boxSizing:"border-box",fontFamily:"inherit",transition:"border-color .2s, box-shadow .2s"};
  const lbl2={fontSize:11,color:"#64748b",display:"block",marginBottom:5,letterSpacing:.5,fontWeight:600,textTransform:"uppercase"};
  const focusIn=e=>{e.target.style.borderColor="#16a34a";e.target.style.boxShadow="0 0 0 3px rgba(22,163,74,.1)";};
  const focusOut=e=>{e.target.style.borderColor="#e2e8f0";e.target.style.boxShadow="none";};

  async function handleFirebaseUser(fbUser, extraName){
    const profile = await ensureUserProfile(fbUser, extraName?{name:extraName}:{});
    if(!profile){
      await _auth.signOut();
      setErr("Could not load your account. Check your internet and try again.");
      return;
    }
    const forceAdmin = fbUser.email?.toLowerCase() === "ndayishimiyealexis50@gmail.com";
    if(!profile.approved && !forceAdmin){
      await _auth.signOut();
      setErr("Your account is pending admin approval. Please wait.");
      return;
    }
    setUser({...profile, uid:fbUser.uid, email:fbUser.email, role: forceAdmin?"admin":profile.role, approved:true});
  }


  async function login(){
    setErr("");
    if(!form.email||!form.password) return setErr("Please enter email and password.");
    setLoading(true);
    try{
      const cred = await _auth.signInWithEmailAndPassword(form.email.trim(), form.password);
      await handleFirebaseUser(cred.user);
    }catch(e){
      const msg=e.code==="auth/user-not-found"||e.code==="auth/wrong-password"||e.code==="auth/invalid-credential"
        ?"Incorrect email or password."
        :e.code==="auth/invalid-email"?"Invalid email address."
        :e.code==="auth/too-many-requests"?"Too many attempts. Try again later."
        :"Sign in failed: "+e.message;
      setErr(msg);
    }
    setLoading(false);
  }

  async function reg(){
    setErr("");
    if(!form.name||!form.email||!form.password) return setErr("Please fill in all required fields.");
    if(form.password.length<6) return setErr("Password must be at least 6 characters.");
    if(form.password!==form.confirmPassword) return setErr("Passwords do not match.");
    setLoading(true);
    try{
      const cred = await _auth.createUserWithEmailAndPassword(form.email.trim(), form.password);
      await ensureUserProfile(cred.user, {name:form.name.trim()});
      await _auth.signOut();
      const isAdmin = form.email.trim().toLowerCase()==="ndayishimiyealexis50@gmail.com";
      if(isAdmin){
        setOk("Admin account created! You can now sign in.");
      } else {
        setOk("Account created! An admin must approve your access before you can sign in.");
      }
      setTab("login");
      setForm({name:"",email:"",password:"",confirmPassword:""});
    }catch(e){
      const msg=e.code==="auth/email-already-in-use"?"An account with that email already exists."
        :e.code==="auth/invalid-email"?"Invalid email address."
        :"Registration failed: "+e.message;
      setErr(msg);
    }
    setLoading(false);
  }

  async function googleSignIn(){
    setErr("");setGLoading(true);
    try{
      const result = await _auth.signInWithPopup(_googleProvider);
      await handleFirebaseUser(result.user);
    }catch(e){
      const msg=
        e.code==="auth/unauthorized-domain"?"This domain is not authorized. Add it in Firebase → Authentication → Authorized Domains.":
        e.code==="auth/popup-blocked"?"Popup blocked. Please allow popups for this site and try again.":
        e.code==="auth/popup-closed-by-user"?"":
        e.code==="auth/cancelled-popup-request"?"":
        "Google sign-in failed: "+e.message;
      if(msg) setErr(msg);
    }
    setGLoading(false);
  }

  async function forgotPassword(){
    if(!form.email) return setErr("Enter your email above first.");
    try{
      await _auth.sendPasswordResetEmail(form.email.trim());
      setOk("Password reset email sent! Check your inbox.");
    }catch(e){setErr("Could not send reset email: "+e.message);}
  }

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#f0fdf4 0%,#ecfdf5 40%,#e0f2fe 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      <div style={{position:"fixed",top:"-10%",right:"-5%",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(22,163,74,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>

/* ─── Rwanda Market ─── */
function RwandaMarket({pigs,feeds,sales,logs,expenses,incomes,reproductions,stock,capital}){
  const active=pigs.filter(p=>p.status==="active");
  const [weather,setWeather]=useState(null);
  const [weatherErr,setWeatherErr]=useState(false);
  const [notifs,setNotifs]=useState([]);
  const [exporting,setExporting]=useState(false);

  /* ── Build smart notifications ── */
  useEffect(()=>{
    const n=[];
    const ready=active.filter(p=>p.weight>=80);
    if(ready.length>0) n.push({type:"sell",msg:`🐷 ${ready.length} pig${ready.length>1?"s":""} are market-ready (80kg+). Best time to sell!`,color:"#16a34a"});
    const lowSt=stock.filter(s=>s.quantity<=s.minLevel);
    if(lowSt.length>0) n.push({type:"stock",msg:`📦 Low stock alert: ${lowSt.map(s=>s.name).join(", ")}`,color:"#d97706"});
    const upcoming=reproductions.filter(r=>r.status==="pregnant"&&daysDiff(r.expectedFarrow)>=0&&daysDiff(r.expectedFarrow)<=7);
    if(upcoming.length>0) n.push({type:"farrow",msg:`🐖 ${upcoming.length} sow${upcoming.length>1?"s":""} due to farrow within 7 days!`,color:"#7c3aed"});
    const sick=logs.filter(l=>l.date===toDay()&&l.sick>0);
    if(sick.length>0) n.push({type:"health",msg:`🏥 ${sick.reduce((s,l)=>s+(l.sick||0),0)} sick pig(s) reported today — check health logs`,color:"#dc2626"});
    if(n.length===0) n.push({type:"ok",msg:"✅ All good! No urgent alerts today.",color:"#16a34a"});
    setNotifs(n);
  },[pigs,stock,reproductions,logs]);

  /* ── Fetch Rwanda weather (Kigali) ── */
  useEffect(()=>{
    fetch("https://wttr.in/Kigali,Rwanda?format=j1")
      .then(r=>r.json())
      .then(d=>{
        const c=d.current_condition[0];
        setWeather({
          temp:c.temp_C,
          feels:c.FeelsLikeC,
          desc:c.weatherDesc[0].value,
          humidity:c.humidity,
          wind:c.windspeedKmph,
          icon:parseInt(c.weatherCode)>=200&&parseInt(c.weatherCode)<300?"⛈️":
               parseInt(c.weatherCode)>=300&&parseInt(c.weatherCode)<600?"🌧️":
               parseInt(c.weatherCode)>=600&&parseInt(c.weatherCode)<700?"❄️":
               parseInt(c.weatherCode)>=700&&parseInt(c.weatherCode)<800?"🌫️":
               parseInt(c.weatherCode)===800?"☀️":"⛅"
        });
      })
      .catch(()=>setWeatherErr(true));
  },[]);

  /* ── Excel Export ── */
  function exportExcel(){
    setExporting(true);
    try{
      const rows=[["FarmIQ — Rwanda Market & Financial Report","","","",""],
        ["Generated:",toDay(),"","",""],["","","","",""],
        ["=== MARKET PRICES (TODAY) ===","","","",""],
        ["Category","Stage/Type","Base Price (RWF)","Trend","Notes"],
        ...Object.entries(RW_BASE_PRICES).map(([k,v])=>[
          k==="heavy"?"Heavy Pig":k,k==="heavy"?"80kg+":v.desc,v.base,
          v.trend==="up"?"📈 Rising":v.trend==="down"?"📉 Falling":"➡️ Stable",
          v.unit
        ]),
        ["","","","",""],
        ["=== YOUR HERD VALUATION ===","","","",""],
        ["Tag","Stage","Weight (kg)","Market Value (RWF)","Status"],
        ...active.map(p=>[p.tag,p.stage,p.weight,getMarketPrice(p.stage,p.weight),"Active"]),
        ["","Total Herd Value","",active.reduce((s,p)=>s+getMarketPrice(p.stage,p.weight),0),""],
        ["","","","",""],
        ["=== FINANCIAL SUMMARY ===","","","",""],
        ["Item","Amount (RWF)","","",""],
        ["Total Income",sales.reduce((s,l)=>s+(l.total||0),0)+incomes.reduce((s,l)=>s+(l.amount||0),0),"","",""],
        ["Total Expenses",feeds.reduce((s,l)=>s+(l.cost||0),0)+expenses.reduce((s,l)=>s+(l.amount||0),0),"","",""],
        ["Net Profit",(sales.reduce((s,l)=>s+(l.total||0),0)+incomes.reduce((s,l)=>s+(l.amount||0),0))-(feeds.reduce((s,l)=>s+(l.cost||0),0)+expenses.reduce((s,l)=>s+(l.amount||0),0)),"","",""],
        ["Herd Market Value",active.reduce((s,p)=>s+getMarketPrice(p.stage,p.weight),0),"","",""],
        ["","","","",""],
        ["=== RWANDA MARKETS ===","","","",""],
        ...MARKETS.map(m=>[m,"","","",""]),
      ];
      let csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
      const BOM="\uFEFF";
      const blob=new Blob([BOM+csv],{type:"text/csv;charset=utf-8;"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;a.download=`FarmIQ_Market_Report_${toDay()}.csv`;
      document.body.appendChild(a);a.click();
      document.body.removeChild(a);URL.revokeObjectURL(url);
    }catch(e){alert("Export error: "+e.message);}
    setExporting(false);
  }

  const totalInc=sales.reduce((s,l)=>s+(l.total||0),0)+incomes.reduce((s,l)=>s+(l.amount||0),0);
  const totalExp=feeds.reduce((s,l)=>s+(l.cost||0),0)+expenses.reduce((s,l)=>s+(l.amount||0),0);
  const herdVal=active.reduce((s,p)=>s+getMarketPrice(p.stage,p.weight),0);
  const ready80=active.filter(p=>p.weight>=80);

  return(<div className="fade-in" style={{maxWidth:900,margin:"0 auto"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:20}}>
      <div>
        <div style={{fontSize:20,fontWeight:700,color:C.text}}>📈 Rwanda Pig Market</div>
        <div style={{fontSize:12,color:C.muted,marginTop:2}}>Live prices · Weather · Alerts · Export</div>
      </div>
      <button onClick={exportExcel} disabled={exporting} style={{
        padding:"9px 18px",borderRadius:9,border:"none",cursor:"pointer",
        background:"linear-gradient(135deg,#16a34a,#15803d)",
        color:"#fff",fontWeight:700,fontSize:13,fontFamily:"inherit",
        boxShadow:"0 2px 8px rgba(22,163,74,.3)",display:"flex",alignItems:"center",gap:7
      }}>
        {exporting?"⏳ Exporting...":"📥 Export to Excel"}
      </button>
    </div>

    {/* ── Notifications ── */}
    <div style={{marginBottom:18}}>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:8}}>🔔 Today's Farm Alerts</div>
      {notifs.map((n,i)=>(
        <div key={i} style={{
          padding:"10px 14px",borderRadius:9,marginBottom:7,fontSize:13,fontWeight:500,
          background:n.color+"18",border:"1.5px solid "+n.color+"44",color:n.color
        }}>{n.msg}</div>
      ))}
    </div>

    {/* ── Weather ── */}
    <div style={{background:C.card,borderRadius:14,padding:16,marginBottom:18,border:"1px solid "+C.border}}>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>🌤️ Kigali Weather (Live)</div>
      {weather?(
        <div style={{display:"flex",flexWrap:"wrap",gap:12,alignItems:"center"}}>
          <div style={{fontSize:36}}>{weather.icon}</div>
          <div>
            <div style={{fontSize:22,fontWeight:700,color:C.text}}>{weather.temp}°C</div>
            <div style={{fontSize:12,color:C.muted}}>{weather.desc} · Feels like {weather.feels}°C</div>
          </div>
          {[["💧 Humidity",weather.humidity+"%"],["🌬️ Wind",weather.wind+" km/h"]].map(([l,v])=>(
            <div key={l} style={{background:C.elevated,borderRadius:8,padding:"8px 14px",textAlign:"center"}}>
              <div style={{fontSize:11,color:C.muted}}>{l}</div>
              <div style={{fontSize:14,fontWeight:700,color:C.text,marginTop:2}}>{v}</div>
            </div>
          ))}
          <div style={{fontSize:11,color:C.faint,marginLeft:"auto"}}>
            ⚠️ Hot &gt;30°C = stress risk<br/>🌧️ Heavy rain = disease risk
          </div>
        </div>
      ):weatherErr?(
        <div style={{color:C.muted,fontSize:13}}>⚠️ Weather unavailable — check internet connection</div>
      ):(
        <div style={{color:C.muted,fontSize:13}}>⏳ Loading weather...</div>
      )}
    </div>

    {/* ── Market Prices ── */}
    <div style={{background:C.card,borderRadius:14,padding:16,marginBottom:18,border:"1px solid "+C.border}}>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>💰 Today's Rwanda Market Prices</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
        {Object.entries(RW_BASE_PRICES).map(([k,v])=>{
          const price=Math.round(v.base*getDailyVariance());
          return(
            <div key={k} style={{background:C.elevated,borderRadius:10,padding:"10px 12px",border:"1px solid "+C.border}}>
              <div style={{fontSize:11,color:C.muted,marginBottom:3}}>{v.desc}</div>
              <div style={{fontSize:14,fontWeight:700,color:C.accent}}>{fmtRWF(price)}</div>
              <div style={{fontSize:10,color:C.muted,marginTop:2}}>per {v.unit}</div>
              <div style={{fontSize:10,marginTop:4,color:v.trend==="up"?"#16a34a":v.trend==="down"?"#dc2626":C.muted}}>
                {v.trend==="up"?"📈 Rising":v.trend==="down"?"📉 Falling":"➡️ Stable"}
              </div>
            </div>
          );
        })}
      </div>
    </div>

    {/* ── Your Herd Valuation ── */}
    <div style={{background:C.card,borderRadius:14,padding:16,marginBottom:18,border:"1px solid "+C.border}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text}}>🐷 Your Herd Valuation</div>
        <div style={{fontSize:13,fontWeight:700,color:C.accent}}>Total: {fmtRWF(herdVal)}</div>
      </div>
      {ready80.length>0&&(
        <div style={{background:"#16a34a18",border:"1px solid #16a34a44",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:12,color:"#16a34a",fontWeight:600}}>
          🏷️ {ready80.length} pig{ready80.length>1?"s":""} ready to sell now (80kg+) — potential: {fmtRWF(ready80.reduce((s,p)=>s+getMarketPrice(p.stage,p.weight),0))}
        </div>
      )}
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead>
            <tr style={{borderBottom:"1px solid "+C.border}}>
              {["Tag","Stage","Weight","Market Value","Ready?"].map(h=>(
                <th key={h} style={{padding:"6px 10px",textAlign:"left",color:C.muted,fontWeight:600}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {active.sort((a,b)=>getMarketPrice(b.stage,b.weight)-getMarketPrice(a.stage,a.weight)).map(p=>(
              <tr key={p.id} style={{borderBottom:"1px solid "+C.border+"66"}}>
                <td style={{padding:"7px 10px",fontWeight:700,color:C.text}}>{p.tag}</td>
                <td style={{padding:"7px 10px",color:C.muted}}>{p.stage}</td>
                <td style={{padding:"7px 10px",color:C.muted}}>{p.weight}kg</td>
                <td style={{padding:"7px 10px",fontWeight:700,color:C.accent}}>{fmtRWF(getMarketPrice(p.stage,p.weight))}</td>
                <td style={{padding:"7px 10px"}}>
                  <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:p.weight>=80?"#16a34a22":"#f59e0b22",color:p.weight>=80?"#16a34a":"#d97706",fontWeight:600}}>
                    {p.weight>=80?"✅ Sell Now":"⏳ Growing"}
                  </span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>

    {/* ── Rwanda Markets ── */}
    <div style={{background:C.card,borderRadius:14,padding:16,marginBottom:18,border:"1px solid "+C.border}}>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>📍 Rwanda Livestock Markets</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {MARKETS.map(m=>(
          <div key={m} style={{background:C.elevated,borderRadius:8,padding:"8px 14px",fontSize:12,color:C.text,border:"1px solid "+C.border}}>
            📍 {m}
          </div>
        ))}
      </div>
    </div>

    {/* ── AI Market Advice ── */}
    <AIPrediction pigs={pigs} feeds={feeds} sales={sales} logs={logs} expenses={expenses} incomes={incomes} reproductions={reproductions} stock={stock}
      topic={`Rwanda pig market advisor. Herd value=${fmtRWF(herdVal)}, ready to sell=${ready80.length} pigs, profit=${fmtRWF(calcPnL(capital||{transactions:[]},feeds,sales,expenses,incomes).profit)}. Give: 1) best time to sell now, 2) which pigs to sell first, 3) price negotiation tips for Rwanda markets, 4) seasonal price trends, 5) how to get best price at ${MARKETS[0]}.`}
      label="🤖 AI Market Strategy" icon="📈"/>
  </div>);
}

/* ─── Admin Home ─── */
function AHome({pigs,feeds,sales,logs,users,expenses,incomes,reproductions,stock,allData,setPage,capital,setCapital}){
  const active=pigs.filter(p=>p.status==="active");
  const {totalInc,totalExp,profit}=calcPnL(capital||{transactions:[]},feeds,sales,expenses,incomes);
  const herdValue=active.reduce((s,pig)=>s+getMarketPrice(pig.stage,pig.weight),0);
  const pregnant=reproductions.filter(r=>r.status==="pregnant");
  const lowStock=stock.filter(s=>s.quantity<=s.minLevel);
  const upcomingFarrows=pregnant.filter(r=>daysDiff(r.expectedFarrow)<=7&&daysDiff(r.expectedFarrow)>=0);
  const recentActivity=[...feeds.map(f=>({...f,type:"feed"})),...sales.map(s=>({...s,type:"sale"})),...logs.map(l=>({...l,type:"log"}))].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,6);
  const capitalBalance=calcCapitalBalance(capital,feeds,sales,expenses,incomes);
  const [showCapitalSet,setShowCapitalSet]=useState(false);
  const [newInitial,setNewInitial]=useState("");
  const [fixDone,setFixDone]=useState(false);
  const [fixing,setFixing]=useState(false);

  async function fixCapital(){
    setFixing(true);
    try{
      // Step 1: wipe local state immediately
      setCapital(prev=>({...prev, transactions:[]}));
      // Step 2: write clean capital to Firestore directly
      const freshAll=await getOnlineFarmData()||{};
      const cleanedCapital={...(freshAll.capital||{initial:0}), transactions:[], _wiped:true};
      await FS_FARM_DOC.set({...freshAll, capital:cleanedCapital, updatedAt:new Date().toISOString()});
      _latestFarmData={...(_latestFarmData||{}), capital:cleanedCapital};
      setFixDone(true);
      setTimeout(()=>setFixDone(false),5000);
    }catch(e){alert("Fix failed: "+e.message);}
    setFixing(false);
  }
  return(<div>
    <div style={S.h1}>📊 Farm Overview</div>
    <div style={S.sub}>{toDay()} · FarmIQ AI Management</div>

    {/* Capital Banner */}
    <div style={{background:"linear-gradient(135deg,#0f2318,#1a3d26)",borderRadius:14,padding:"16px 20px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
      <div>
        <div style={{fontSize:11,color:"rgba(74,222,128,.7)",fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>💵 Business Capital Balance</div>
        <div style={{fontSize:28,fontWeight:800,color:capitalBalance>=0?"#4ade80":"#f87171"}}>{fmtRWF(capitalBalance)}</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,.45)",marginTop:2}}>Initial: {fmtRWF(capital.initial||0)} · Income: {fmtRWF(totalInc)} · Expenses: {fmtRWF(totalExp)}</div>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <button onClick={()=>{setShowCapitalSet(!showCapitalSet);setNewInitial(String(capital.initial||""));}} style={{padding:"8px 14px",borderRadius:9,border:"1px solid rgba(74,222,128,.35)",background:"rgba(74,222,128,.1)",color:"#4ade80",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>⚙️ Set Capital</button>
        <button onClick={()=>setPage("capital")} style={{padding:"8px 14px",borderRadius:9,border:"1px solid rgba(74,222,128,.35)",background:"rgba(74,222,128,.1)",color:"#4ade80",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>📋 View All</button>
        <button onClick={fixCapital} disabled={fixing} style={{padding:"8px 14px",borderRadius:9,border:"1px solid rgba(239,68,68,.4)",background:"rgba(239,68,68,.15)",color:"#f87171",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
          {fixing?"⏳ Fixing...":"🔧 Fix Balance"}
        </button>
      </div>
    </div>

    {/* Emergency alert — capital.transactions has stale data poisoning balance */}
    {capitalBalance !== (capital.initial + totalInc - totalExp) ? (
      <div style={{padding:"14px 16px",background:"rgba(239,68,68,.1)",border:"2px solid rgba(239,68,68,.4)",borderRadius:12,marginBottom:12,animation:"pulse 2s ease-in-out infinite"}}>
        <div style={{fontWeight:700,color:"#f87171",fontSize:14,marginBottom:6}}>⚠️ Capital Balance Mismatch Detected</div>
        <div style={{fontSize:12,color:"#fca5a5",marginBottom:10}}>
          Expected: <strong>{fmtRWF(capital.initial+totalInc-totalExp)}</strong> &nbsp;|&nbsp; Showing: <strong>{fmtRWF(capitalBalance)}</strong><br/>
          Old deleted data is still affecting the balance. Click below to fix it permanently.
        </div>
        <button onClick={fixCapital} disabled={fixing} style={{padding:"10px 20px",borderRadius:9,border:"none",background:"#dc2626",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",width:"100%"}}>
          {fixing?"⏳ Fixing & Syncing to Server...":"🔧 FIX CAPITAL BALANCE NOW →"}
        </button>
      </div>
    ):null}

    {fixDone&&<div style={{padding:"12px 16px",background:"rgba(22,163,74,.12)",border:"1px solid rgba(22,163,74,.4)",borderRadius:10,marginBottom:12,fontSize:13,color:"#4ade80",fontWeight:700}}>
      ✅ Capital fixed! Transactions wiped from server. Balance now: {fmtRWF(capital.initial+totalInc-totalExp)}
    </div>}
    {showCapitalSet&&<div style={{...S.card,marginBottom:12,border:"1px solid rgba(74,222,128,.3)"}}>
      <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:10}}>Set Initial Capital</div>
      <div style={{display:"flex",gap:9}}>
        <input type="number" value={newInitial} onChange={e=>setNewInitial(e.target.value)} placeholder="e.g. 500000" style={{...S.inp,flex:1}}/>
        <button onClick={()=>{setCapital(prev=>({...prev,initial:parseFloat(newInitial)||0}));setShowCapitalSet(false);}} style={{...S.btn(C.accent),padding:"9px 16px",whiteSpace:"nowrap"}}>Save</button>
      </div>
      <div style={{fontSize:11,color:C.faint,marginTop:6}}>This sets your starting business capital before any transactions.</div>
    </div>}

    {/* Smart alerts */}
    {upcomingFarrows.length>0&&<div onClick={()=>setPage("reproduction")} style={{padding:"10px 14px",background:"rgba(244,114,182,.08)",border:"1px solid rgba(244,114,182,.3)",borderRadius:9,marginBottom:10,fontSize:13,color:C.pink,cursor:"pointer"}}>
      🐖 {upcomingFarrows.length} farrowing(s) in ≤7 days → Click to view
    </div>}
    {lowStock.length>0&&<div onClick={()=>setPage("stock")} style={{padding:"10px 14px",background:"rgba(239,68,68,.06)",border:"1px solid rgba(239,68,68,.25)",borderRadius:9,marginBottom:10,fontSize:13,color:C.red,cursor:"pointer"}}>
      📦 {lowStock.length} low stock alert(s): {lowStock.map(s=>s.name).join(", ")} → Click to restock
    </div>}

    {/* Main stats */}
    <div style={S.g4}>
      {[{l:"Active Pigs",v:active.length,c:C.accent},{l:"Total Income",v:fmtRWF(totalInc),c:"#10b981"},{l:"Net Profit",v:fmtRWF(profit),c:profit>=0?C.accent:C.red},{l:"Herd Value",v:fmtRWF(herdValue),c:C.purple}].map(s=>(
        <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c,fontSize:s.v.length>8?15:22}}>{s.v}</div></div>
      ))}
    </div>
    <div style={S.g4}>
      {[{l:"Market Ready (80kg+)",v:active.filter(p=>p.weight>=80).length,c:C.amber},{l:"Pregnant Sows",v:pregnant.length,c:C.pink},{l:"Workers",v:users.filter(u=>u.role==="worker"&&u.approved).length,c:C.blue},{l:"Logs Today",v:logs.filter(l=>l.date===toDay()).length,c:C.muted}].map(s=>(
        <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c}}>{s.v}</div></div>
      ))}

    <div style={S.g2}>
      <div style={S.card}>
        <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:10}}>📋 Recent Activity</div>

        {recentActivity.map((l,i)=>(
          <div key={i} style={S.row}><span style={{color:C.muted}}>{l.type==="feed"?"🌾 ":l.type==="sale"?"🏷️ ":"📝 "}{l.worker||l.buyer}</span><span style={{color:C.accent,fontWeight:600}}>{l.total?fmtRWF(l.total):l.cost?fmtRWF(l.cost):"✓"}</span></div>
        ))}
      </div>
      <div style={S.card}>
        <div style={{fontSize:13,fontWeight:700,color:C.purple,marginBottom:10}}>💹 Portfolio Snapshot</div>
        {[["Realized Profit",fmtRWF(profit),profit>=0?C.accent:C.red],["Herd Market Value",fmtRWF(herdValue),C.purple],["Total Portfolio",fmtRWF(profit+herdValue),profit+herdValue>=0?C.accent:C.red],["ROI",totalExp>0?((profit/totalExp)*100).toFixed(1)+"%":"—",C.amber]].map(([l,v,c])=>(

      <AIPrediction pigs={pigs} feeds={feeds} sales={sales} logs={logs} expenses={expenses} incomes={incomes} reproductions={reproductions} stock={stock} topic="Predict 30-day profitability based on all income and expenses. Include reproduction forecast and market timing. Give specific improvement actions." label="30-Day Profit Forecast" icon="📈"/>
